<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sabermetrics{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="{{ url_for('main.index') }}" class="nav-brand">Sabermetrics</a>
        <div class="nav-links">
            <a href="{{ url_for('main.index') }}">Home</a>
            <a href="{{ url_for('main.reference_search') }}">Rules Search</a>
            <a href="{{ url_for('main.cost_report') }}">Cost Report</a>
        </div>
    </nav>

    <main class="container">
        {% if error is defined and error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Sabermetrics for Magic &mdash; Local-only Commander deck optimization</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
