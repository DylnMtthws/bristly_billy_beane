user:
  default_budget_usd: 200
  default_power_target: 3
  # price_efficiency carries no composite weight: price is a constraint
  # (budget cap, Pareto axis, rebalancing), not a quality signal.
  default_weights:
    # Price is a constraint, not a ranking term (both branches converged on
    # this; ours removes the weight entirely and enforces budget via the
    # Pareto price axis + rebalancing).
    synergy: 0.40
    replacement_value: 0.30
    mana_efficiency: 0.30
    price_efficiency: 0.0

llm:
  profile_model: "claude-sonnet-4-6"
  fit_model: "claude-sonnet-4-6"
  synthesis_model: "claude-sonnet-4-6"
  refresh_model: "claude-haiku-4-5"
  max_candidates_for_llm_fit: 50
  prompt_caching: true
  monthly_cost_ceiling_usd: 15.0

embeddings:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu"
  cache_dir: "./data/embedding_cache"

pipeline:
  hard_filter_target: 3000
  embedding_filter_target: 200
  structural_filter_target: 200
  candidates_per_slot: 5
  # Per-card ceiling as fraction of budget (0.25 => $50 cards at $200).
  per_card_budget_fraction: 0.25
  # Dollars reserved per unfilled slot in greedy affordability checks.
  budget_reserve_per_slot: 1.0

refresh:
  scryfall_daily: true
  topdeck_weekly: true
  decklist_sources_weekly: true
  edhrec_weekly: true
  mtgapi_rulings_monthly: true
  set_refresh_quarterly: true

output:
  deck_format: "json"
  include_alternatives: true
  alternatives_per_slot: 3

knowledge_base:
  game_knights_archidekt_owner: "GameKnights"
  game_knights_fallback_deck_ids: []
  edhrec_articles:
    - slug: "how-to-build-commander-deck"
      url: "https://edhrec.com/articles/how-to-build-a-commander-deck"
    - slug: "superior-numbers-land-counts"
      url: "https://edhrec.com/articles/superior-numbers-land-counts"

scoring:
  # Synergy matrix: blend of two pairwise signals (sum to 1.0). Co-occurrence
  # was removed in Option A criterion 3 (tracked-deck corpus too sparse for an
  # honest commander-conditioned rate); its weight went to rules + embeddings.
  synergy_rule_weight: 0.615
  synergy_embedding_weight: 0.385
  # Card Win Equity (TopDeck tournament outcomes): additive, one-sided,
  # sample-gated boost. Only affects commanders with >= cwe_min_sample
  # tournament decks (~158 today). Bumped from the 0.10 default to weigh the
  # competitive signal more heavily; still bounded (max boost = cwe_weight).
  cwe_weight: 0.20
  cwe_min_sample: 5
  # Greedy fill: marginal value of adding a card.
  marginal_synergy_weight: 0.45
  marginal_role_cvar_weight: 0.35
  marginal_cvar_weight: 0.20
  # Greedy fill: bonus for cards common in the target variant's real decks.
  # Additive on top of the three weights above -- absence must never penalize.
  marginal_empirical_weight: 0.25
  marginal_empirical_noisy_weight: 0.15
  # Stage 4 role generators: same bonus, on the generators' 0-1 score scale.
  generator_empirical_weight: 0.20
  generator_empirical_noisy_weight: 0.12
  # Empirical staple reservation (Stage 3.5): reserve differentiator slots for
  # strong-consensus corpus cards. Bounded so most slots stay open for the
  # reasoning engine's undervalued picks.
  empirical_reserve_min_inclusion: 0.45
  empirical_reserve_max_slots: 12
  empirical_reserve_max_fraction: 0.5
  # Fraction of ELIGIBLE staples reservable when a big corpus has more
  # consensus cards than max_slots (still bounded by max_fraction of slots).
  empirical_reserve_eligible_fraction: 0.4
  # LLM safety net: review uncorroborated picks (corpus inclusion below this)
  # before merely weak ones.
  safety_uncorroborated_max_inclusion: 0.10
  # Infrastructure generators: bonus for cards of a type still below its
  # empirical target (e.g. enchantment removal while enchantments are short).
  generator_type_need_weight: 0.15
  # Budget rebalancing: minimum deck-objective gain per move (spend-down
  # stops when gains go below this, whatever budget remains).
  rebalance_min_gain: 0.003
  # Bonus for rocks that produce the deck's colors (2+ color decks).
  ramp_color_fit_weight: 0.20
  # Score multiplier for cards that mass-remove the deck's engine type.
  anti_synergy_penalty: 0.15
  # Multiplier for payoffs locked behind attacking with multiple creatures
  # (battalion/raid/'prepared'), applied when the variant's real decks run
  # fewer than combat_gated_creature_min creatures.
  combat_gated_discount: 0.5
  combat_gated_creature_min: 25
  # Deck-level objective (components, all 0-1 normalized).
  objective_synergy_density_weight: 0.28
  objective_role_coverage_weight: 0.22
  objective_alignment_weight: 0.18
  objective_avg_cvar_weight: 0.14
  objective_curve_coherence_weight: 0.08
  objective_type_coherence_weight: 0.10
