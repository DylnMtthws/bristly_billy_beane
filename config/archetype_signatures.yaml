# Macro-archetype signature library (Phase 1).
#
# Universal EDH archetype signatures, keyed by *signature cards* — cards whose
# presence is strongly indicative of an archetype, pooled across all commanders
# (NOT commander-specific). A deck's archetype score is the summed weight of the
# signature cards it runs; a deck is assigned an archetype when that score meets
# `min_score`.
#
# This is the card-based counterpart to analytics/theme_patterns.py (which
# detects themes from oracle text). Card signatures are higher-precision for
# macro-archetypes because a card like "Blood Artist" essentially only appears
# in aristocrats decks, whereas the word "sacrifice" appears everywhere.
#
# Weights: 1.0 = near-exclusive to this archetype (low false-positive), 0.7-0.9
# = strong but shared, 0.5 = supporting. Some cards intentionally appear under
# two archetypes (e.g. Doubling Season in tokens AND counters) — that overlap
# is real and is left visible rather than force-resolved.
#
# `tag_aliases` maps this archetype to the creator-assigned Archidekt tags
# (Phase 0.3) used as validation ground truth. Keep aliases tight: a tag only
# aliases an archetype when it reliably means that archetype.
#
# NOT modeled in v1 (documented limitation): "Control" and "Combo" are defined
# by interaction density / deck-specific piece counts, not a stable signature-
# card set, so they are deliberately omitted rather than modeled badly. Decks
# tagged only Control/Combo are reported as "unrecognized" during validation.

# Tuned + expanded on a 103-deck creator-tag-labeled corpus (archetype_validation.py).
# Threshold sweep: 2.0 -> macro F1 0.48 (recall starved); 1.0 -> optimum; 0.8 ->
# precision collapses. Signature-expansion pass (generators/enablers added to
# tokens, spellslinger, voltron, stax; wheel spells downweighted so one staple
# can't trip the archetype): micro F1 0.591 -> 0.622, recall 0.56 -> 0.62,
# precision held. Bootstrap (200x) macro F1 ~0.62, 95% CI [0.51, 0.71] — real
# gain, wide CI (only 103 labeled decks).
# Remaining, and WHY (data limits, not signature gaps — do NOT chase by tuning):
#   - reanimator precision ~0.38: "FPs" are graveyard decks tagged Graveyard/
#     Self-Mill not Reanimator (tag incompleteness) — its cards are correct.
#   - mill recall stuck: the corpus's "Mill" decks are mis-tagged cEDH combo.
#   - counters recall stuck: missed decks are commander-centric, no engine cards.
# These need cleaner/larger labels, not more signatures.
default_min_score: 1.0

