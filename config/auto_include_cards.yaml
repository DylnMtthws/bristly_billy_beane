# Auto-include cards for infrastructure generators.
# Cards listed here are always included when conditions are met.
# protect_from_swap: true prevents swap_refine() from replacing these staples.

always:
  # Sol Ring is the best mana rock in Commander, period. It and Arcane Signet
  # (below) are the only unconditional rocks: every other rock competes in the
  # color-aware scored pool, where signets/talismans that fix the deck's
  # colors outrank colorless producers (Mind Stone, Thought Vessel and
  # Commander's Sphere were demoted from this list for exactly that reason --
  # fixed 0.95 placements were beating color-fixing rocks scoring could rank).
  - name: "Sol Ring"
    role: "ramp"
    protect_from_swap: true

multicolor:
  # Command Tower and Arcane Signet for any deck with 2+ colors
  - name: "Command Tower"
    role: "land"
  - name: "Arcane Signet"
    role: "ramp"
    protect_from_swap: true

three_plus_colors:
  # Exotic Orchard for 3+ color decks
  - name: "Exotic Orchard"
    role: "land"

has_black:
  # Bojuka Bog for any deck with black (free graveyard hate)
  - name: "Bojuka Bog"
    role: "land"

has_green:
  - name: "Nature's Lore"
    role: "ramp"
  - name: "Cultivate"
    role: "ramp"
  - name: "Kodama's Reach"
    role: "ramp"

